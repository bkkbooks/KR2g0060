body:
  text: 松亭行紀傳記類四雜録之屬提要臣等謹案松亭行紀二卷國朝髙士竒撰康熙辛酉二月癸酉聖祖仁皇帝恭奉太皇太后行幸溫泉四月戊子駕出喜峰口士竒皆扈從因記其往來所經謂喜峰口為古松亭關故以名書然松亭關在喜峰口外八十里士竒合而一之未詳考也所述灤河源流亦不明確至溫泉有朱砂礬石硫黃三種聖祖御製幾暇格物編中言之甚明士竒日侍禁闥典文翰之職不應不睹乃仍襲宋唐庚揣測之説殆不可解以其敘出山川風景足資考證而附載詩文亦皆可觀故所著塞北小抄别存其目而此編則仍録之焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ffba54676f9b76eaf1781792c8b29392b6239f6a8dc7bbdd568b113f0f3c9eca
