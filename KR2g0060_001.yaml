body:
  text: 欽定四庫全書松亭行紀卷上詹事府詹事髙士竒撰康熙二十年三月二十日癸酉上奉太皇太后行幸溫泉兼巡塞外平明法駕出東直門龍斿鳯蓋照耀川原午張黃幄尚食上躬親侍膳太皇太后鑾輿早晚出入上櫜鞬騎導執禮恭謹道路觀瞻咸頌聖孝隆古未有也駐蹕李家橋召入帳殿賜食夜深而退此後率以為常不盡紀扈從恭紀二首金麾玉幰動鳴鑾宫扇開時夾道看淡蕩栁風初換律蘢蔥花氣不驚寒天倫有樂誠非易帝孝無涯禮更難此日寰瀛同頌祝呼嵩遙徹五雲端晴光藹藹下雲衢喜見天家禮數殊六膳午調親捧爵九斿晨動自經塗春深晚葉藏啼鳥風細輕輪轉相烏藻衛前頭時載筆擬將三輔繼黃圖甲戌天氣融和春風駘宕有晴光送逺目勝氣入幽襟之意駐蹕三河縣之東馬房按通州境上有煙墩五曰石里燕郊東留村大黃莊髙麗莊有子場三曰崇教鳴玉花園又有馬房八自鄭村壩以下俱在城北三四十里內乃前朝豢牧之所是夕侍於帳殿上曰明日當經盤山爾曽遊否臣士奇對曰昔聞盤山乃畿輔名勝之地未曽登歷每切夢想上命侍衛一人同臣明晨往遊兼諭臣士竒曰上盤中盤及李靖菴淨業菴林木泉石尤為幽邃不可不到須窮一日之力從容眺望也臣拜命而出乙亥曉行殘月尚在馬首同侍衛取徑盤山時訪山家經漁子山在平谷縣東北十里上有大塜舊傳黃帝陵也其上有軒轅臺下有軒轅廟唐陳子昻詩云北登薊丘望求古軒轅臺尚想廣成子遺跡白雲隈唐書子昻擢右拾遺㑹武攸宜討契丹髙置幕府表子昻參謀次漁陽攸宜輕易無將略子昻諫之薊丘古漁陽地今讀其覽古詩前有小序云丁酉嵗吾北征出自薊門歷觀燕之舊都慨然仰歎憶昔樂生鄒子羣賢之遊盛矣因登薊丘作七詩以志之此其一也城南五里逆流河之西有看花臺相傳金章宗玩花於此俱未及登策馬行二十里許遙望峰崖層峭怪石磊落松栝千株扶疏髙下悉託根石上叢條交䕃時方春夏之交景物明媚山花半謝山鳥亂啼細路崚嶒馬為屢却憩李靖菴菴後有峰髙二里頂廣四丈而平為李靖舞劍臺云靖伐髙麗過此唐李從簡來遊為題數字嶺上一石如人著幞頭坐而義腰土人目為石尉遲東十里為雙峰寺過砂嶺髙二百餘仭樵路宛轉僅通人行灌莽荒榛未得安步循巖數十轉心目漸髙每度一折山情易向樵聲自谷中起下視初不見人又二十里將抵上盤積石齒齒時聞人語在天上亦不敢仰視橫嶺懸度積石相乘直上可三百尺至盤頂雲罩寺下視村落但見柔煙巔有舍利塔登覽極逺志稱影落塞外上有二龍潭下有潮井小坐憩息復尋少林寺寺傍紅龍池鑿石如龍以朱塗之甚不可解稍下為中盤寺一泉出峭壁草石間曲折作溪徑石竇下為砂河戊午九月上遊中盤寺愛其幽勝書戶外一峰兼御製詩曰中盤遙見蓮花峰日出山林氣色重老衲題詩渾半偈翠輿臨發又從容今鐫於石亦茲山之榮遇也將遊淨業菴天已垂暮山光嵐氣濛濛濕衣下山行二十餘里抵御營已二鼓矣志載盤山一名盤龍山在薊州西北二十五里髙二千仭周百餘里勢磅礴而盤桓因以為名昔人有云南距滄溟西盡泃水東放碣石自逺望之層巒疊翠崒嵂排空殆非虛語駐蹕薊州所屬鄭家莊北得記一篇詩十首賜遊盤山記康熙二十二年三月二十日鑾輿東巡臣士竒以職在禁近得從屬車越明日道經薊野盤山翠色落人衣裾上念臣性耽林壑命往遊焉凌晨策馬由平谷登大嶺緣仄徑至李靖菴觀舞劍臺歷青陽峪猿攀蟻附凌髙降深二十餘里過雙峰寺至峰頂登黃龍祖師殿及舍利塔俯視盧龍古塞黃花白狼三千里外烽臺濠塹瞭然目中真大觀也憩雲罩寺僧指淨業上方白猿洞天門開諸勝人踪希絶悵然久之循山徑遊古中盤十餘里中巖谷深隱積石趾錯泉琤琮流石罅雜雜蔚蔚屢引清興入正法院仰瞻御製遊盤山詩雄渾髙華增輝巖穴夫盤山屹立薊門逺望之渾然一峰入山則竒峯疉出而九花雙峰紫蓋挂月自來為尤著盤桓起伏百有餘里水石潺潺古松萬株鬱鬱蒼蒼是山之所以獨擅其勝耶至其土人所言除夜聖燈為山中靈蹟則臣未之信也臣少懷微尚分當隱約窮岫知遇以來待詔金馬門者七年出入於紫宸者又五年早夜兢兢不敢自佚雖遙想靈山有愛嘉名無由欣對豈期豹尾之下遂有遊之人登臨永日亦足以融養淳淑遂其所適之性耳雖遐心之可託實君恩之難忘執筆賦詩明其淡泊之志而已盤山昔讀寰中記茲山勞夢想十年思一遊塵事日鞅掌扈蹕過薊門承恩恣觀賞驅馬踰崔嵬趣途漸深廣縈回石徑紆盤旋下復上山勢兀嶙峋奔崖盡骯􅗣緩策登危峰煩襟為一爽嚶嚶野鳥鳴汩汩山溪響暮春天氣佳小憩在林莽松泉臣所須性志本疏朗茫茫屬車塵時曳青藤杖從來箕潁心對此聊俯仰李靖菴夾天開小徑岝㠋隱諸峰黛色千崖石濤聲萬里松林深微見寺谷靜逺聞鐘虛閣何年借聊清塵外蹤雲罩寺蘿磴雲中出花宫象外懸登臨空大漠呼吸逼青天締構神功健香燈寶地偏無生難可問小坐亦泠然上盤絶頂千仭聳危岫孤髙數上盤扶笻看更險捫葛步仍難天外松風落崖邉草色寒塵襟一以滌獨立感無端登舍利塔穿雲尋雁塔掃石憩山椒晴影臨邉塞天風下泬寥斷階苔半掩廢碣字全銷颯沓聞清籟鈴聲徹半霄古中盤丘壑茲多美流連空復情出山泉决决遷樹鳥嚶嚶暝色催歸騎樵歌引客程何如友麋鹿日日卧香蘅正法禪院一徑入空林重巖秀色深暫來青嶂下聊暢白雲心澗影留仙蹕山光動睿吟今朝遍幽賞歸路日將沉自雙峰寺望上盤山崒嵂雙峰日已西空山寂寂鳥頻啼依稀樵徑無人跡只有花香送馬蹄松下禪扉報午鐘溪橋路斷白雲封山僧指㸃遙岑寺猶隔巑岏四五峰下盤山作撲面紅塵暗客衣年來蠟屐事全稀却從仗外看山色一路題詩歷翠微丙子曉起入侍帳殿上問爾遊盤山曽有詩否臣士竒對曰此地山川類多雄偉盤山細石長松境獨幽秀真為名區疇昔夢寐思得一遊不意扈從之時䝉恩賜臣登眺行幄中曽草記一篇詩數首所懷尚未能盡上曰俟至溫泉録出朕將覽焉駐蹕遵化州所屬稻地里丁丑惠風初拂見山家桃花掩映籬落得詩一首駐蹕遵化州所屬蔡家莊見山家桃花三月年光過漸稀尚餘紅蘂綻山扉多應野外無拘束留得春光緩緩歸戊寅扈蹕登景忠山山在遷安縣界亭亭孤峙髙數十丈鑿石為磴折旋而上路徑陡絶歷十餘級一轉輒有小祠可以坐憩其巔祀碧霞元君殿宇華潔香火甚盛上登陟從容早至絶巘臣愧無濟勝具追隨獨後上題靈山秀色四字命侍衛掖臣而升午後微雨經三屯營郛郭堅固居人駢雜明總兵戚繼光鎮此路傍祠廟多祀之駐蹕遷安縣所屬灤河岸遷安本漢之令支縣令音零支音秖即離支也東漢縣廢遼始於令支故城遷定州安喜縣於此置安喜縣金大定間始易今名桑欽水經曰濡水從塞外來東南過遼西令支縣北酈道元注云濡水出禦彜鎮東南其水二源雙川夾山西北流出合成一川又西北徑禦彞故城東鎮北百四十里北流左道則連泉水注之又西北徑淥水池南其水淵而不流又曲而東徑故城北連結池沼謂之連泉浦又東北注難河右則汗水入焉水出東塢南西北流徑沙野南名曰沙鎮西北入難河濡難聲相近遂語訛耳濡水又北徑沙野西又北徑箕安山東北流徑林山北有池潭濡水又東南流徑令支縣故城東王莽之令氏亭也夀河水入焉水出令支縣藍山南後魏輿地風土記云藍山者其色藍翠重疊故名之也又一統志云灤河源自口北開平來徑遷安縣界至盧龍縣南合漆河四十五里入灤州又南至樂亭縣入於海又灤州志灤河在州城東三里發源於炭山亂泉濆湧合流東一百二十里至宣府又東北一百二十里至雲州堡又東北三百六十里至桓州又自桓州過口北又自北而南入上都開平界東流七百里至欒陽營又一百六十里至遷安縣又東南六十里至盧龍縣西南合流於漆水又南四十里至灤州又南五十里至嶽婆港夾樂亭縣東為葫蘆河西為淀流河合流六十里至馬頭營又二十里為緑洋溝入於海按灤水前皆無名禹貢夾右碣石入於河注云其水如遼濡滹易皆中髙不與河通故必自北海然後能達河也漢地理志遼西郡肥如縣注𤣥水東入濡水濡水南入海陽顔師古曰濡音乃官反遼史黃水北出盧龍山南流入於濡水而五音集韻則云濡水名一作渜在遼西肥如海陽又云濡奴官切蓋音灤也方氏通雅亦曰濡水音乃官反今字書韻書失此音据此則今水有灤而無濡且渜灤字形相類豈古或通用而然耶駐蹕遷安縣所屬灤河岸登景忠山絶頂應制曉仗肅前驅逺峰忽迎面騁目迷煙蘿游鞅豁蔥蒨逼仄馬難旋鬱紆磴屢變五步十步中髣佛樓閣現直上丹梯懸橫題金粉絢天氣引翠華斯須若奔電峻陟慙微躬傳呼復扶倩慿虛乃振衣心悸目猶眩俄驚巔崖間飛翥盡美善山光愜睿情萬靈答隆眷扈從過三屯營百雉巖巖古鎮雄野祠多祀戚元戎荒屯黃犢耕春雨老樹烏鴉噪晚風壁壘遙分榆塞北旌旗曽駐薊門東登壇將略今誰在寂寂花開亂草中己卯河干設帳殿幕城上奉太皇太后駕臨觀覽上率侍衛操小舟捕魚以奉晨餐聞太皇太后慈顔喜恱賞賚甚厚隨從舟中者皆得拜賜焉賦恭紀詩一首未刻上坐帳殿中臣士竒侍上言灤河之水來自塞外論斷形勢如觀指掌仰見宸衷經天緯地之學非臣淺陋所能窺測也晚復張宴岸側宴內大臣及近侍諸臣天既薄暮隔河山色輕翠迎人波光蕩漾青林送影臣士竒䝉賜紫金杯酒且諭臣曰今晚可不侍行殿必飲此杯也臣士竒感恩飲畢再賦恭紀詩一首仍駐蹕遷安縣所屬灤河岸駐蹕灤河恭紀崔嵬帳殿俯清流波影瀠洄曉霧收隔岸蒼巖開畫障傍筵芳樹隱丹騶銀梭入饌初張罟翠釜烹鮮正泊舟為奉慈仁心豫悅漫云灞滻作春遊灤河侍宴恭紀澄波浩浩漾斜暉手捧金螺坐翠微捲幔河山來帝座按圖形勢繞皇畿潛鱗競向頺陽躍白鷺遙看破暝飛何幸叨逢瑤水宴身同藻荇沐光輝庚辰駕回幸溫泉駐蹕遵化州城東按遵化本漢右北平境唐於此置馬監及鐵冶因縣焉今因陵寢重地改為州治志稱遵化北有五里河源自片石谷口流坡谷間數里始合沽河又陽河出鮎魚口黎河清水河出道溝峪口俱西南流㑹沽河水經注云沽水又南出峽岸有二城世謂之獨固門以其藉險慿固易為依居兩壁升聳疏通若門今獨固門一名龍門在遵化州南十餘里上合下開開處髙六丈許水自懸崖傾㵼而下觸石成井奔蕩之聲轟然若雷石門峽在遵化西五十里有石將軍在陜西髙三丈水經注云灅水又東南徑石門峽山髙嶄絶壁立洞開俗謂之石門口漢中平四年漁陽張純反殺右北平太守劉政五年遼東太守楊絃與中郎將孟溢率公孫瓚討純戰於石門大敗之即此地也辛巳太皇太后駕至溫泉宫是日上謁孝陵隨往仁孝皇后孝昭皇后陵駐蹕鮎魚池行宫鮎魚池舊有城堡以山頂石似鮎魚故名湯泉在遵化西北四十里福泉山下寬平約半畝許有泉沸出明總兵戚繼光甃石為池築堂其上曰九新世祖章皇帝駕常臨幸命建宫其旁丹碧而已不加華彩其池更以白玉石甃之深二丈方四尋鑿石為龍吻噴甚怒其泉深碧可鑑氣極溫暖投錢池中翻若黃蝶百折乃至底四壁碑刻唐順之汪道昆周天球詩最後一小石刻明武宗宫人王氏詩云絶塞窮冬凍異常小池何事暖如湯可憐一脉溶溶水不為人間洗冷腸又有寒泉去湯泉數武出於泥沙以劑泉之溫明王衡湯泉記曰泉本寒沁有石根可一畝類焦釜覆之水受石性故沸所不及則否蓋數武之內而水火共鼎亦一竒也宫又有寺建自貞觀二年名福泉寺考博物志云凡水有石流黃其泉則溫或云神人所暖主療人疾唐子西云或說貴州地性酷烈故山谷多湯泉或說水出硫黃地中即溫今臨潼湯泉乃在正西而貴州餘水未必皆熱則地性之說固已失之以硫黃置水中水未必皆熱則硫黃之論亦未為得竊意湯泉在天地間自為一類受性本然不必有待然後溫也水經注云古右北平徐無城北庾水出焉西南流與灅水合又東南流與溫泉水合按魏土地志云徐無城北有溫湯宋王存九域志遵化縣福泉山下水沸出溫可燖雞旁引為池方平如鑑而水經注言溫泉水源出北山溪是今福泉疑即溫源也南流百步伏入地中又折而東南徑石門峽是即今石門口也是嵗三月六日以兩皇后山陵之役扈從諸臣䝉恩賜觀湯泉同大學士臣明珠李霨尚書臣梁清標吳正治魏象樞朱之弼王熙左都御史臣徐元文侍郎臣楊永寧李天馥項景襄杜臻翰林院學士臣張英侍講學士臣張玉書詹事臣沈荃王揚昌蔣𢎞道通政使司通政臣王盛唐大理寺卿臣張雲翼太常寺卿臣崔澄編修臣杜訥及臣士竒賦詩應制將勒石以垂不朽今附臣詩於左三月六日駐蹕馬蘭谷今呼多作峪賜觀溫泉應制有序蓋聞炎精所藴氣蒸山下之蒙陽德方升暖應谷中之律惟聖人出而地不愛寶斯靈澤通而天其降祥兹溫泉者邇薊苑之神臯當漁陽之勝地一峰特秀湧瑤波銅浦之竒二水分流具養德和神之用恭遇我皇上格天大孝欽奉我太皇太后應地𢎞慈御此仙源聿增景福爰選萬幾之暇時乘六龍以從雲軿引鸞輅齊驅孝推一本野日共山花俱粲慶溢九垓斯帝室之鴻庥洵天倫之樂事然循源甃石不聞唐宗增飾之勞緣砌築宫祗同陶后土茅之略避九成之暑鄙彼甘泉乘三月之和踵於上已臣獲隨龍馭式覩天心祗奉明綸再賡巴奏蕪俚不剪難宣醴瑞於堯年祝願何窮竊比蒲生夫舜日五言恭賦四律兼成碧巘疏靈液虛明湛一泓入階同草色響溜作松聲朔野寒堪辟春山暖倍生真看涵育逺萬彚荷相成文母調神處山阿道路通丹甍開殿迥白石甃池工表瑞稱炎德承歡洽聖衷茅茨仍不剪朴略有唐風半嶺駐鳴驂仙源詔許探沼中浮淑氣空外捲晴嵐濺石流仍潔分杯味獨井由來湯谷裏不羡菊花潭勝日宜登覽川原夕照開澗花含宿雨隴麥拆輕雷前一日初雷地接園林近班隨嶽牧來太和蒸宇宙遙作五雲堆皇上奉太皇太后駐蹕溫泉宫恭紀離宫湯殿接清虛龍首澄泓暖溜瀦碧草逺分貔虎衛紅雲低護鳯鸞輿天恩自許陪仙仗臣職何堪注起居巖下松蘿烟靄合蘢蔥佳氣萬年餘壬午黎明上詣孝陵致祭臣士竒恭紀詩十六韻駐蹕鮎魚池行宫扈從謁孝陵恭紀十六韻峻極開神域潛靈結奧區氤氲羣象集起伏衆山趨秀嶺看千疊平陽面一隅豐碑何嶻􅑖復道盛規模蔥鬱長松古潺湲曲澗紆春林花燦爛曉嶂樹扶蘇翹首瞻陵闕攀髯憶鼎湖肇基宏帝業開運握乾符雨露寰瀛洽烽煙率土無萬年綿玉厯草載閟珠襦柏殿丹雲護苔階石馬趺遺衣同禹服廟器列商瑚穆穆皇情逺森森羽衛驅輕風生邃谷薄霧隱崇途拜謁微班忝齊誠大禮輸龍門回望處佳氣積蒼梧癸未上至純親王停櫬之所祭奠微雨復霽駐蹕鮎魚池行宫四月朔甲申上行圍茅鹿山射得二麞就山陽張幄炙鮮賜內大臣及近侍諸臣因問臣杭州飛來峰及泠泉亭景物臣士竒對曰唐白居易記云山樹為蓋巖石為屏雲從棟生水與階平約略見之矣駐蹕鮎魚池行宫乙酉上周視孝陵風水按孝陵本鳯臺山在遵化州南四十里峰巒層秀頂如華蓋羣岫環拱衆水來歸規模宏整天造地設五峰山在東北崛起東曰快目南曰瑞雲西曰紅翠北曰虎嵒中曰紫蓋綿聨起伏互相擁護真竒境也今封為昌瑞山載祀典駐蹕紅門外丙戌駐蹕鮎魚池行宫臣録盤山遊記及詩進呈御覽丁亥隨上行圍過馬蘭谷馬蘭關舊設副將駐防關口其標下守備駐馬蘭谷守陵官員及上三旗甲士雜居於此方二月時兩皇后山陵巨典臣士奇同學士臣張英編修臣杜訥寄寓道院旬有餘日春花未放兹來已緑葉成隂矣駐蹕鮎魚池行宫再至馬蘭谷懷學士臣張英編修臣杜訥春深谷口上陵時坐卧閒房十日期細雨才抽松葉暗驚雷催放杏花遲還家未久山光别扈蹕重來草色滋今日經過懷舊侣遙知退食自彤墀松亭行紀卷上
