body:
  text: 欽定四庫全書松亭行紀卷下詹事府詹事髙士竒撰戊子上辭太皇太后巡幸喜峰口外蒙古地方駐蹕三屯營城南己丑上再登景忠山駐蹕三屯營城南庚寅駕出喜峰口按喜峰口古松亭山也竒峰削下腰有洞髙二丈餘深倍之遼史為松亭闗𨽻中京留守司開泰中置澤州俘蔚州民立寨居之王沂公曾行程録亦云松亭嶺甚峻險今喜峰口東北有小城曰徐太傅城為明徐中山達所築嵗乆彌堅逺望如碧玉懸崖斗聳人迹希邈昔有人乆戍不歸其父來尋適遇此山下相抱大笑喜極而絶遂塟於是俗因謂之喜峰口後訛為喜峰元許有壬圭塘集載之頗詳兼有詩述其事云兒寒解衣重撫摩兒饑推食孰忍訶長成與國逺負戈一去不返當如何去時云出東北鄙直出榆闗度遼水白頭郎罷與影俱豈憚山川千萬里天教此地適相逢父曰從天墜吾子笑疲樂極俱殞身誰謂情鍾遽如此官家開邉方未已同生又别寧同死山雲漠漠風颼颼山頭雙塚知幾秋當時不忍一朝喜今日翻成千載愁猶勝貞女化為石終古孤身雙不得清江寒影日悠悠行人一去無消息駐蹕喜峰口外白臺夜聞虎嘯響振林谷扈從出喜峰口清蹕出雄闗鳴笳歴荒徼夾嶂真天開壁立盡竒峭往時設重戍藉此為險要戰壘虚風生孤城斜日照年年荷戈人未得失征調自從被至德逺近奉明詔遂使邉隅民不用驚烽燎喜隨萬乘來快哉肆登眺晚宿白臺塞行未十里塞景已殊異入目多荆榛亂峰含紫翠翹首睇長城萬載嚴邉備連幕宿山陽迢遙横晚吹虎嘯巖谷鳴颯颯風隨至幕火散繁星周廬環七萃來朝屬車塵應抗凌雲志辛夘曉發白臺自口内㸔塞上諸山與長城共相起伏坡坨平衍步履可登出口則疊嶂層崖山勢陡峻密篠叢枝攀援無路四望長城雉堞干天如長蛇天矯自西而東絶巘平連飛鳥難越天之所以限中外也過九狐嶺又曰九宫嶺一徑紆折髙下相乘細澗横流淺深競渡中多楓樹及楂梨榆栁餘花新葉紛映馬前左右髙山蹲巖怪石景隨徑轉為態多端黄土崖一峰矗峙峭壁如削石色蒼黄髙百餘仞其間多生松栝有一巖竇在半山巉絶處兩崖中斷支一木橋危險無異石梁遙望竇中窻牖畢具石佛横卧昔傳異僧居焉山有大小石塔七十座土人名為打藍蘇妹譯云七十座塔也過此二十餘里境忽寛平有土城遺址曰寛城相傳明宣宗駐蹕於此一面倚山一面尚餘土墉通南北二門甃石殘缺蔓草荒蕪中㣲見井䦨柱礎土人名為博洛忽洞者是也按明宣宗實録宣徳三年八月丁未車駕發京師渡潞河九月庚戌入薊州至石門驛喜峰口守將遣人馳奏烏梁海萬衆侵邉已入大寧經㑹州將及寛河宣宗覽曰是天遣来此投死耳遂駐蹕石門之東召問諸將咸請擊之亦有請益徴兵者宣宗曰此出喜峰口路狹且險單騎可行若候諸將並進慮緩事機遂决策親征簡精鋭騎士三千人人二騎自持十日糧命文武扈從者悉留遵化惟太子少傅楊榮從乙卯出喜峰口軍士銜枚斂甲韜戈而馳昧爽至寛河距敵營二十里分鐵騎為兩翼夾擊之宣宗親射其前鋒殪三人敵望見黄龍旗悉下馬羅拜請降皆生縳之獲生口駝馬牛羊輜重丙辰駐蹕寛河分命諸將搜山明日移營前進至冷嶺又明日駐㑹州大饗將士親製詩歌慰勞之又數日班師駐鐵將軍店及擺山站按此則宣宗當日駐蹕寛河纔兩日不知此城何時所建也過寛城數里山更奇峭河流漸廣有石磯黑色周十數丈交枕河畔夾岸生芳枳木連雜以草卉山水之趣聊以騁懐上尚食水次諭臣士竒曰前朝此土悉為枕戈卧甲征戰之所自我太祖太宗威徳逺敷數十年來䝉古四十八部盡歸王化今朕巡幸所經安得不念祖功宗德臣士竒對曰仰見聖心不㤀創業艱難誠社稷蒼生之福也駐蹕大石磯北是日御製過黄土崖大石磯詩二首臣士竒捧讀畢恭和進呈歸幕後又得雜詩數首御製巡幸出喜峰口過黄土崖紫塞雙崖出丹梯百尺懸草香遮細路樹老卧晴煙地為時巡到山當隘口偏何年留石室駐馬望層巔御製大石磯逺近峰逥合潺湲澗淺深一磯横大石萬騎出層林䝉密巖花發綿蠻谷鳥吟龍堆塵不到慿眺足娱心奉和御製過黄土崖原韻黄崖天外削碧樹半空懸徑絶遲歸鳥山空聚午烟北來千嶂密西去一闗偏萬乘披襟處風廻百尺巔奉和御製遇大石磯原韻山色㸔多變行程覺漸深花光浮斷岸水氣㪚喬林怪石干雲染攢松萬籟呤龍鑣成小憩灑墨寄遙心長城嬴秦曾設險絶徼營堅城蜿蜒亘萬里形勢何崢嶸塹山築雉堞絶壁同雲横人工既已盡天險巍然成控制接陜右拱抱還燕京疇昔邉事嚴老幼苦長征秋聲警哨動夜火邉烽明盛朝乆息戰四境歌承平石樓鳥雀栖亭障荆棘生但㸔飲馬窟日落寒潭清過九狐嶺六龍乘曉發萬騎陟重岡灌木翳青天亂石縈羊腸縱横澗水流隐約山花香山花非一狀紅紫含芬芳更有青楓樹芳䕃凝衣裳仰面觀竒峰怪石紛低昂時當四月初猶覺山風凉曠然心眼豁不似披遐荒兼旬實壯遊塵慮應相㤀黄土巖何年鑿山骨屹立疑千尋徙倚不可即駐馬空沉吟藤梢與葛刺䝉密何隂森懸崖支一木㣲徑通崎嶔巖扉有遺跡邈矣烟霞深杳靄青松際白雲迷至今寛城是明宣宗駐蹕處山川盡逼仄草樹更蒙茸行行忽開廣疑有城郭蹤西南倚峭壁土阜餘髙墉傳是翠華駐彷彿門兩重草中見磝礐石罅山花穠當年辟疆土此地陳軍容裹糧驅戍卒打火起邉烽今逢聖人出萬里皆提封明宣宗駐蹕寛城北五里水次省方入逺疆駐蹕蒼崖裏崖下俯長河波瀾最清駛娟娟三兩峰掩映雲霞紫㣲風響磵松殘陽下流水幽賞平生懐對此翻然喜捲幔息銀燭愛㸔山月起壬辰山崖盤複前望似無去徑峰迴路轉乃更豁通出達希喀布齊爾口為䝉古界山情頓易喀爾沁部落長率其所屬跪迎道左上慰勞之駐蹕達希喀布齊爾口北將出達希喀布齊爾口道中作衆山向背殊峰峰自迴互石上漾清泉山根叢茂樹咫尺誤行踪往來遵細路灣環數十轉潺湲八九渡林花雜春夏風景變朝暮勝攬意不窮塞行有深趣車駕出達希喀布齊爾口喀爾沁廓爾沁諸部落率其所屬伏迎道左直北幽厓早向誠不須更築受降城職方記載梯航路王㑹傳呼拜舞聲紅綻邉花迎雉扇青摇巖樹轉龍旌太平遊幸非征伐豈是元封自勒兵癸已喀爾沁部落以騎兵三千前驅列圍分左右翼持兩白旗連岡截野馳二三十里或三四十里遇有平曠之地圍乃漸合髙山峻嶺望而岞㠋𩔖皆土壌策馬可登茂林青榛參天匝地獵騎紛馳穿林帶谷司馬相如所云雷動焱至星流霆擊庶幾似之駐蹕察漢城地方從獵蒼山萬疊雨初晴從獵朝㸔塞上清月兎射來誇技絶星狼追得鬭身輕班聨翡翠翎中坐隊入鵝黄褶裏行十二羽林皆健將只容欵段一書生臣班在親隨侍衛之列甲午廓爾沁國及班侖諸部落皆至朝于帳殿是日上於圍中射一虎應弦而斃蒙古諸部落覩上弧矢之威無不頌服駐蹕烏蘭布爾哈蘇乙未上行圍山中水泉清泠纎草鋪茵襍卉柔荑布滿岩谷有名長十入者紫色蓓蕾元果囉羅納延塞上曲云雙鬟小女玉娟娟自捲氊簾出帳前忽見一枝長十入折來簪在㡌簷邉即此花也五代胡嶠北行紀所載旱金蓮大如掌金色爍人青囊如中國金橙而色𩔖藍二種皆有之又有離婁開花如雞子殻中含雙蘂色若蓮瓣嬌艷可愛一名䕡茹芍藥紅白者最多曉風㣲逗芳香襲人賦塞外見芍藥詩二首駐驆西爾哈河塞外見芍藥花絶徼寒多春較遲馬頭驚見兩三枝雖然不及䢴溝種也自穠華鬭一時淺淺輕膚映玉膚任他開落委蘼蕪焉支山下多顔色得似新花嬝娜無丙申上尚食山陽賜臣士竒炙鹿茸一雙少頃諭臣士竒曰見爾頗能乘馬何不習射臣士竒對曰臣幼時亦曽習射但力㣲不能開勁弓今乆廢矣上曰射乃六藝之一讀書人亦當知之駐蹕拜查月色如晝夜深立幕外望塞上山川巉巖絡繹圍拱中原山空夜半萬籟閴寂惟聞御營行漏時傳崖谷答響鄰幕諸人俱已熟睡獨立沈吟賦詩二首月夜望塞外山川行漏宵嚴夜月明髙山絡繹影縱横清添鳯拍吹笳壯光動龍堆牧馬驚紫塞蒼蒼綿大漠黄榆歴歴暗長城天教此地分中外秦漢徒多用武名塞下感懐淺草坡前罷獵歸髙林斜月影㣲㣲金波不改秦時色玉暈仍涵漢殿輝閨信有誰傳錦字庭趨還獨念斑衣休貪定逺功名著客路年年已息機丁酉沙際草青細渠決決塞外四月早暮猶寒惟亭午日色暄暖有如春暮方當圍塲未合下馬趺坐天光雲影别具野趣是目圍中上又親射一虎駐蹕和爾和戊戌所經時見䝉古居人在山隩向陽處富者支毳幕内設床幔以粧錦為之亦有箱奩諸具貧者幕上惟覆以葦花布為幔客至則男婦欣喜炊大熱乳酪奉客有出挏酒梨麫來勸者幕外多樹亂木為柵以圈牛馬虞有虎害大約塞外山川逺者數十里近者十餘里互相綿亘兩山斷處謂之一溝每溝所住䝉古不過三兩家恐礙放牧也土極肥沃居者嬾於耕耨僅種稗稷不設溝塍播種之後聴其自生以羊為常餐比亦知養雞豚矣駐蹕巴爾漢湯泉較遵化之泉更熱秦少㳺所謂蔽於叢薄堙於土塗抱清懐㓗歴千百年莫或稍試於用者上為留憩月上乃歸晚至湯泉夕照下西嶺平楚生荒煙千旗散晚獵萬馬奔前川忽看碧草際一水流濺濺深澗轉澄徹煖氣如沸煎少坐濯塵纓云是古湯泉逺聴鐃吹發帟幕燈光懸四望盡暝色圓月明山巔己亥平明巡視者報夜來虎至營中傷一驪馬拖至前山林木下食未半其虎尚在山間上率侍衛往射殪之其大如牯牛諸蒙古云此虎乆踞道側傷人甚衆今除行旅之害共相色喜為賦射虎行是日山間鹿麞極多雉方卵於草間得一子獻者賚銀五分所進數千枚駐蹕烏郎岡射虎行輿圖蕩蕩界䝉古玉輦時巡歴兹土迴岡巨壑叢棘多隂森林木不知午千騎萬乘排空來夜張行殿山之塢月上忽聞羣馬驚傳道山前出猛虎曉㸔一馬果摧折血肉淋漓去兩股龍鑣飛控陟層崖禁林衛士挾弓弩摉巖剔藪無幾時一箭横胸洞肺腑逺人手額復戰慄跽言此虎為患苦道傍白日每捕人傷殘行旅莫可數幸茲惡劣得剪除當代君王果神武從來射虎多耳聞何似臣今得目覩因嘆蠢頑本不靈貪饕無厭乃自取不然長林茂草間餐眠何畏施網罟殺人安人王者心即此推之澤自普庚子入山峰圍崖合中更坦朗長松千餘株歴落偃仰各具異態數百年物也午後隂雨晚復明霽山山夕照樹樹殘霞志為塞上矣駐蹕穆雷布爾扯兒辛丑駐蹕滸西漢臺山阜平連蔓草無際土人云此去二百里則皆坡坨莎草漸無林木為産駱駝之所壬寅山谷之間多氊廬木柵喀爾沁部落所聚於此不逺駐蹕塔布恩海落思泰地方上賜内酒一樽諭曰爾總不能飲可散同行者拜命而出癸夘駐蹕俄倫蒿齊特此日方進新櫻桃甲辰駐蹕察漢城南或云即㑹州城也連日行圍所歴類皆荒山叢林人跡罕至之處扈從塞外雜記古人邉塞吟但道沙漠苦誰知逺徼外峰崕更參伍地腴苜蓿肥山幽松樹古若令勤耕織其益豈小補葦幕山之陽終嵗牧牛羖近稍敦禮義漸漸識規矩傴僂謁道隅趨蹡申拜舞欣看古甌脱近受王化撫空山狐兔羣終歳少人跡叢條蔽逺岡墮葉堆荒澤首夏猶苦寒邉風日將夕夜雨聲瀟瀟燈光暗油碧雲黑峰巒沉但見炊煙白喬松千餘株枝枝盡竒矯逺望青岑邉似在白雲表雨過林壑清天空初日曉羽騎來驂驔霓旌更飄緲迤邐入山谷細路歴深窅終日臨髙峰嶔崎復盤遶回首顧榆闗萬山青不了方知地軸雄結構非藐小人生宇宙間志願當何如不行萬里路即讀萬卷書早歳慕五嶽中年困窮居耳目苦未廣懐抱慙空虚鳴鑣隨禹載攬轡觀皇輿出境雖不遥問歴皆異墟朝朝扈蹕行非是勞征車詩成傲往彦徒見征伐餘乙已賜宴喀爾沁廓爾沁諸部落於達希喀布齊爾口上坐黄幄中皇長子及溫郡王侍諸部落率其所屬列坐於幄之左内大臣列坐於幄之右䝉古上下數千人人賜酒一金叵羅乳茶一癭椀頃刻而遍宴畢賜諸部落蟒袍㡌帶鞾襪弓矢佩刀鞍轡緞帛銀布有差内大臣噶布喇引一蒙古至幄前上召臣士竒數其創痕頭面項背胷臂凡二十四處上曰此䝉古梅勒章京也近年調征處州陣前所創如許得以不死臣士竒奏曰皇上推心置腹以誠信待人故使逺人皆能盡力疆塲仰見恩澤之入人深也駐蹕達希喀布齊爾口北薄暮雨是日御製塞上宴諸藩詩敬録於左龍沙張宴塞雲收帳外連營㪚酒籌萬里車書皆屬國一時劍佩列通侯天髙大漠圍青嶂日午㣲風動綵斿聲教無私疆域逺省方隨處示懐柔臣士竒賦恭紀詩二首宴喀爾沁諸部落恭紀黄幄髙張羽衛陳遐方述職盡稱臣金螺酒醴頒三爵寳椀茶膏遍一巡問俗逺同虞出狩要盟欲笑漢和親長城有險休重設至治從來守四鄰㸔賜喀爾沁及諸部落恭紀帝澤從容被八埏精鏐文織㪚窮邉應羞使者通西域何用將軍款右賢錦繡平添林嶠色雲霞四映塞垣天賈生五餌終迂論王道平平自可傳丙午上回鑾入達希喀布齊爾口諸䝉古跽送道左行未十里山氣縷縷含煙忽復流雲四野天氣曛黑大雨如注青林翠壁頃刻莫辨時而長虹㧞地直與殘陽相射輕雷斷雨隠隠遙天駐蹕氷窖地方氊幄孤檠添我旅夢也過大石磯行雨中流雲浮晶晶山川雜煙霧出沒多奇峰穹窿各吞吐驅馬上懸崖崖傾馬驚顧百里盡蒙密杳靄失前路古道幾登陟亂流繞深樹活活雨脚低隠隠雷聲布澗外起長虹轉覺天垂暮丁未曉霽過黄土崖寛城諸處時已清和林木蔥茂花香夾路紫白萬狀山多蘐草開滿嵓岫採以為蔬即黄花菜也侍衛諸臣競取以進入喜峰口始見瓦屋不禁心喜駐蹕灤陽城南將入喜峰口新霽雲際露山頂青林来日光曉従六龍行髙下逾重岡巖花落未殘磵道餘芬芳鳥聲辨闗樹人語如故鄉鐃歌清吹發逺風旌斾揚鏨鑿萬仞餘鬱岪臨大荒歴茲戰鬭地壯士顔慨慷願施造化功處處知耕桑戊申經三屯營遵化州見道傍野寺榴花盛開感節物之變賦詩紀之上至溫泉問太皇太后安駐蹕鮎魚池行宫是日都門遣僕至得家信入喜峰口後見路傍野寺榴花去時邉草色初緑歸路山榴蘂已紅古寺一枝偏照眼短衣匹馬夕陽中過遵化突兀孤城倚重邊堠臺暸館尚依然將軍幕冷埋戈甲開府堂空咽管絃耕鑿已安全盛目輓輸猶説亂離年遥瞻王氣陵園近短麥青青遍野田己酉駐蹕鮎魚池行宫庚戍駐蹕鮎魚池行宫辛亥致祭孝陵駐蹕鮎魚池行宫壬子上奉太皇太后囘鑾望黄花山山勢雄陡戍樓盡廢明蔣一揆記云黄花鎮有禮鼠色如鼦而毛淺冬時聚榛實為糧于穴中作岐穴貯之若倉囷然多至三斗其榛實皆美好價倍于人所收者山氓多掘取之鼠失榛實牝牡皆笮脰樹枝懸死若縊鎮將閔之為禁甚厲然不能止駐蹕薊州所屬七里峰村東皇上自溫泉宫奉太皇太后回鑾恭紀芝葢華旂曙色分花光山翠早迎薰塵銷驛路初經雨栁暗官城半拂雲尊養靈泉來祓濯寛租窮户重耕耘詔所過之地免今年租車音噦噦還鑣處鸞鶴紛飛下紫雯黄花山青蒼百仞截雲孤守險曽經却萬夫古戍有樓惟舊壘防秋立寨只長榆兵銷治世耰鋤滿路近空村雞犬無一自八荒歸雨露邉陲萬里盡亨衢五月朔癸丑上命再續盤山之遊道由薊州問趙韓王故里不可得自此入山路極嶮巇青林文篠竒石流泉與野花蛺蝶相映帶所歴崕谷皆寂不聞人聲淨業菴在林巒最深處髙閣瞰空幽邃可愛老僧十餘人亦皆朴野汲泉瀹茗少為流憩復由古中盤而歸駐蹕三河縣東過薊州是趙韓王普故里塵埃千載遇事業建隆尊逺略銷諸鎮深謀定太原機權爭片語岸谷搆㣲寃忝竊叨王爵何曽讀魯論半生懐舊惡垂老固新恩故里荒丘著虚名宋史存春流仍澗澗野燒尚村村向曉過城北徒聞鳥雀喧再遊盤山暮春陟崇阿山靈謝客乆迴車重逡巡倏復中夏首取徑異疇昔髣髴尋谷口緒風從南來泉聲清且瀏繁英過眼新密䕃解襟受感此節物遷行行歴岡阜石人坐藤蘿招我若舊友四山空翠來盤礴豁兩肘對之萬慮澄身世渺何有側足天地間煙雲結櫺牖顧茲塵外㳺屢許鞅掌後飛躍任羽鱗睠焉撫髙厚淨業菴徃者度遙岑忽焉日將夕耽幽殊未窮兹來理輕策傑閣霄際穿踈櫺樹杪隔𨼆翳勢若蔵攀躋境迺闢老僧畏送迎相顧始肅客能炊松火紅亦煮澗泉白攬衣席空階閒雲生咫尺下嶺望前旌迢迢踰紫陌甲寅始換新縠駐蹕通州所屬崇閣莊南晚得㣲雨乙卯入東直門都城人家户懸赤靈符菖蒲艾葉儼是重午行役之人初不知也上奉太皇太后回宫扈從回京艾白蒲香五月天歸時清夢擬遊仙新詩句句關山壯何似前人羽獵篇松亭行紀卷下
